<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Artigo — Fábio Pereira da Silva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  .article-wrap{
    position:relative; z-index:1;
    max-width: 720px; margin: 0 auto; padding: 64px 24px 96px;
  }
  .back-link{
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--mono); font-size:13px; color:var(--text-dim);
    text-decoration:none; margin-bottom:40px;
  }
  .back-link:hover{ color:var(--copper); }

  .article-meta{
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    margin-bottom:18px;
  }
  .article-tag{
    font-family:var(--mono); font-size:11px; letter-spacing:.06em;
    color:var(--copper); border:1px solid var(--line);
    padding:3px 8px; border-radius:3px;
  }
  .article-date{
    font-family:var(--mono); font-size:12px; color:var(--text-dim);
  }
  .lang-switch{ display:flex; gap:8px; margin-left:auto; }

  .article-title{
    font-family:var(--mono); font-weight:800;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    line-height:1.2; margin-bottom:36px;
  }

  /* markdown body */
  #article-body{ font-size:16.5px; color:var(--text); }
  #article-body h1, #article-body h2, #article-body h3{
    font-family:var(--mono); margin: 38px 0 16px; line-height:1.3;
  }
  #article-body h1{ font-size:1.5rem; }
  #article-body h2{ font-size:1.25rem; color:var(--cyan); }
  #article-body h3{ font-size:1.05rem; }
  #article-body p{ margin-bottom:20px; color:#d8d5ce; }
  #article-body a{ color:var(--cyan); text-decoration:underline; text-underline-offset:3px; }
  #article-body ul, #article-body ol{ margin: 0 0 20px 22px; color:#d8d5ce; }
  #article-body li{ margin-bottom:8px; }
  #article-body code{
    font-family:var(--mono); font-size:.9em;
    background:var(--bg-raised); border:1px solid var(--line);
    padding:2px 6px; border-radius:3px;
  }
  #article-body pre{
    background:var(--bg-raised); border:1px solid var(--line);
    border-radius:6px; padding:18px; overflow-x:auto; margin-bottom:24px;
  }
  #article-body pre code{ border:none; padding:0; background:none; }
  #article-body blockquote{
    border-left:2px solid var(--copper); padding-left:16px;
    color:var(--text-dim); margin:0 0 20px;
  }
  #article-body hr{ border:none; border-top:1px solid var(--line); margin:36px 0; }
  #article-body img{ max-width:100%; border-radius:6px; margin: 12px 0; }
</style>
</head>
<body>
  <div class="grid-overlay" aria-hidden="true"></div>

  <div class="article-wrap">
    <a class="back-link" href="index.html">&larr; voltar</a>

    <div class="article-meta">
      <span class="article-tag" id="article-tag"></span>
      <span class="article-date" id="article-date"></span>
      <div class="lang-switch" id="lang-switch"></div>
    </div>

    <h1 class="article-title" id="article-title">Carregando…</h1>
    <div id="article-body">Carregando artigo…</div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <script src="content.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const src = params.get("src");
      const lang = params.get("lang") || "pt";

      const bodyEl = document.getElementById("article-body");
      const titleEl = document.getElementById("article-title");
      const switchEl = document.getElementById("lang-switch");
      const tagEl = document.getElementById("article-tag");
      const dateEl = document.getElementById("article-date");

      if (!src) {
        bodyEl.textContent = "Nenhum artigo especificado (?src=...).";
        titleEl.textContent = "Artigo não encontrado";
        return;
      }

      // Find the matching entry in content.js to get tag/date/title/langs
      const meta = (window.SITE_CONTENT?.articles || []).find(
        (a) => a.langs && (a.langs.pt === src || a.langs.en === src)
      );

      if (meta) {
        tagEl.textContent = meta.tag || "";
        dateEl.textContent = meta.date || "";
        document.title = `${meta.title} — Fábio Pereira da Silva`;

        // language switch buttons
        if (meta.langs.pt) {
          const a = document.createElement("a");
          a.className = "lang-badge";
          a.href = `artigo.html?src=${encodeURIComponent(meta.langs.pt)}&lang=pt`;
          a.textContent = "PT";
          if (lang === "pt") a.style.borderColor = "var(--cyan)";
          switchEl.appendChild(a);
        }
        if (meta.langs.en) {
          const a = document.createElement("a");
          a.className = "lang-badge";
          a.href = `artigo.html?src=${encodeURIComponent(meta.langs.en)}&lang=en`;
          a.textContent = "EN";
          if (lang === "en") a.style.borderColor = "var(--cyan)";
          switchEl.appendChild(a);
        }
      }

      fetch(src)
        .then((res) => {
          if (!res.ok) throw new Error("not found");
          return res.text();
        })
        .then((md) => {
          // Use first markdown H1 as the page title if present, else fall back to content.js title
          const firstHeading = md.match(/^#\s+(.+)$/m);
          titleEl.textContent = firstHeading ? firstHeading[1] : meta?.title || "Artigo";
          bodyEl.innerHTML = marked.parse(md);
        })
        .catch(() => {
          titleEl.textContent = "Artigo não encontrado";
          bodyEl.textContent = `Não foi possível carregar "${src}".`;
        });
    })();
  </script>
</body>
</html>
